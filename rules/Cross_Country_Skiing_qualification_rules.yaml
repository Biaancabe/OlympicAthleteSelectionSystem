Description: "Cross Country Skiing Qualification Rules for Olympic Games 2026"
created at: 2025-12-16
updated at: 2025-12-16
version: 1.0

# No Class filter at first, because U23 results are included in one of the criterias. 
# Question for developper: Where to put the class filter in that file? Every route? Every condition?
# Only one condition has a different class (Route 2 condition 1)
# U23 competiton is specified in the competiton name.Therefore, I don't think a class filter is needed. But no class filter at the beginning to keep the U23 results in. 
# Need a discipline filter: only singles disciplines are considered. Teams are formed with athletes that qualified for singles competitons. Duscuss if manually or automatic verification.

rule_tree:
  description: "Qualification Criteria for Cross Country Skiing at Olympic Games 2026"
  sport: "Cross Country Skiing"

  # main criterias for group 1 athletes
  criteria: 
    # Route 1: 1x Top-3 World Championships 2025 AND 1x Top-30 World Cup 2025/2026
    - description: "Top-3 WM 2025 + Top-30 WC 2025/26"
      priority: 1
      conditions: 

      - description: "Top-3 WM 2025"
        competition: ["FIS Nordic World Ski Championships"]
        date: ["2025-02-26", "2025-03-09"]
        performance: [1, 3]
        count_at_least: 1

      - description: "Top-30 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance: [1, 30]
        count_at_least: 1

    # Route 2: 1x Top-3 U23 World Championships 2025 AND 1x Top-25 World Cup 2025/2026
