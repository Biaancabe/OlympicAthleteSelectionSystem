Description: "Snowboard Qualification Rules for Olympic Games 2026"
created at: 2025-12-22
updated at: 2025-12-22
version: "1.0"

# Structure notes:
# - discipline and gender are specified on the criterion (route) level.
# - A list in the "competition" field means OR (any one of the listed competitions counts).
# - Snowboard Cross and Parallel Giant Slalom have a different World Cup time window
#   than the park disciplines (Big Air, Halfpipe, Slopestyle).
#
# OPEN QUESTION for Martin (Routes 2.1 / 2.2):
# The "World Cup Standings 2024/25" date range is only 4 days long
# (["2025-01-03", "2025-01-07"]), which looks too short for a full-season standings.
# Kept as in the original file, but should be confirmed with Martin.

rule_tree:
  description: "Qualification Criteria for Snowboard at Olympic Games 2026"
  sport: "Snowboard"
  class: "Seniors"

  criteria:
    # Route 1.1: Top-3 WM 2025 AND Top-8 WC 25/26 (Big Air, Halfpipe, Slopestyle)
    - criterion_id: "snowboard_r1_1"
      description: "Top-3 WM 2025 + Top-8 WC 25/26"
      discipline: ["Big Air", "Halfpipe", "Slopestyle"]
      priority: 1
      conditions:
        - condition_id: "snowboard_r1_1_c1"
          description: "Top-3 WM 2025"
          competition: ["FIS Snowboard World Championships"]
          date: ["2025-03-17", "2025-03-30"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 3
          count_at_least: 1
        - condition_id: "snowboard_r1_1_c2"
          description: "Top-8 WC 25/26"
          competition: ["VISA FIS Snowboard World Cup"]
          date: ["2025-07-01", "2026-01-20"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 8
          count_at_least: 1

    # Route 1.2: Top-3 WM 2025 AND Top-8 WC 25/26 (Snowboard Cross, Parallel Giant Slalom)
    - criterion_id: "snowboard_r1_2"
      description: "Top-3 WM 2025 + Top-8 WC 25/26 (SBX, PGS)"
      discipline: ["Snowboard Cross", "Parallel Giant Slalom"]
      priority: 1
      conditions:
        - condition_id: "snowboard_r1_2_c1"
