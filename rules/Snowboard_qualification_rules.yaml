Description: "Snowboard Qualification Rules for Olympic Games 2026"
created at: 2025-12-22
updated at: 2025-12-22
version: 1.0

# Rules vary for almost every discipline, especially in the priority 2 criterias.
# Tried to regroup as much as posssible to avoid redundancy, but still quite long.
# Snowboard Cross and Parallel Giant Slalom have different time windows as the other disciplines (Slopestyle, Big Air, Halfpipe).

# There are Gender specific criterias. It is specified when needed.  

# Some criterias have a list of competitions, to avoid a "or". We can change that if needed. 

# Also to check: where to put the discipline specification in the tree. For now, in the leaf. But could be earlier to avoid redundancy.Same comment for gender. 

rule_tree:
  description: "Qualification Criteria for Snowboard at Olympic Games 2026"
  sport: "Snowboard"
  class: "Seniors"

  criteria:
    # Route 1.1: Top-3 World Championships 2025 AND Top-8 World Cup 2025/2026, Big Air, Halfpipe and Slopestyle
    - description: "Top-3 WC 2025 AND Top-8 WC 2025/2026"
      discipline: ["Big Air", "Halfpipe", "Slopestyle"]
      priority: 1
      conditions:

        - description: "Top-3 WC 2025"
          competition: ["FIS Snowboard World Championships"]
          date: ["2025-03-17", "2025-03-30"]
          performance: [1, 3]
          count_at_least: 1

        - description: "Top-8 WC 2025/2026"
          competition: ["VISA FIS Snowboard World Cup"]
          date: ["2025-07-01", "2026-01-20"]
          performance: [1, 8]
          count_at_least: 1

