Description: "Figure Skating Qualification Rules for Olympic Games 2026"
created at: 2025-12-15
updated at: 2025-12-22
version: "1.1"

# Special structure: a minimum number of points must be reached in ANY ONE of the
# listed competitions. Because each competition has its own time window, and because
# reaching the score in ONE competition is enough (OR-logic), each eligible competition
# is modelled as its own route. Routes are gender-specific (185 pts Women, 210 pts Men).
# No Pairs or Ice Dance: no quota places available for Switzerland.

rule_tree:
  description: "Qualification Criteria for Figure Skating at Olympic Games 2026"
  sport: "Figure Skating"
  class: "Seniors"

  criteria:
    # ---------- WOMEN: minimum 185 points ----------

    # Route 1: Women, World Championships
    - criterion_id: "figure_skating_r1"
      description: "Women Singles 185 points - World Championships"
      gender: ["Women"]
      priority: 1
      conditions:
        - condition_id: "figure_skating_r1_c1"
          description: "Minimum 185 points"
          competition: ["ISU World Figure Skating Championships"]
          date: ["2025-01-01", "2026-01-18"]
          performance:
            metric: points
            operator: greater_or_equal
            value: 185
          count_at_least: 1

