Description: "Freestyle Skiing Qualification Rules for Olympic Games 2026"
created at: 2025-12-22
updated at: 2025-12-22
version: "1.0"

# Structure notes:
# - discipline and gender are specified on the criterion (route) level.
# - A list in the "competition" field means OR (any one of the listed competitions counts).
# - Ski Cross has a different World Cup time window than the other disciplines.
#
# OPEN QUESTION for Martin (Routes 2.1 / 2.2):
# The original file had an invalid date range for "World Cup Standings 2024/25"
# (end before start: ["2025-03-01", "2025-01-07"]). The source document specifies
# only "Year: 2025" for these standings, so it is provisionally set to
# ["2025-01-01", "2025-12-31"]. Confirm the correct standings window with Martin.

rule_tree:
  description: "Qualification Criteria for Freestyle Skiing at Olympic Games 2026"
  sport: "Freestyle Skiing"
  class: "Seniors"

  criteria:
    # Route 1.1: Top-3 WM 2025 AND 1x Top-8 WC 25/26 (all disciplines except Ski Cross)
    - criterion_id: "freestyle_skiing_r1_1"
      description: "Top-3 WM 2025 + 1x Top-8 WC 25/26"
      discipline: ["Aerials", "Aerials Team", "Moguls", "Dual Moguls", "Big Air", "Slopestyle", "Halfpipe"]
      priority: 1
      conditions:
        - condition_id: "freestyle_skiing_r1_1_c1"
          description: "Top-3 WM 2025"
          competition: ["FIS Freestyle World Ski Championships"]
          date: ["2025-03-17", "2025-03-30"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 3
          count_at_least: 1
        - condition_id: "freestyle_skiing_r1_1_c2"
          description: "1x Top-8 WC 25/26"
          competition: ["FIS Freeski World Cup"]
          date: ["2025-07-01", "2026-01-20"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 8
          count_at_least: 1

