Description: "Bobsleigh Qualification Rules for Olympic Games 2026"
created at: 2025-12-15
updated at: 2025-12-22

version: 1.2

# SPECIAL TEAM VERIFICATION REQUIREMENT:
# Check if whole team can run for Switzerland. Verification done manually outside of this YAML structure.
# Special age criteria for Route 5 (secondary criterias)
# In the results file, the column Person/Team countains the pilots name. 

rule_tree:
  description: "Qualification Criteria for Bobsleigh at Olympic Games 2026"
  sport: "Bobsleigh"
  class: "Seniors"

  criteria: 
    # Route 1: 2x Top-6 World Cup 2025/2026
    - description: "2x Top-6 WC 2025/26"
      priority: 1
      conditions: 

      - description: "Top-6 WC 2025/26"
        competition: ["IBSF World Cup"]
        date: ["2025-11-01", "2026-01-18"]
        performance: [1, 6]
        count_at_least: 2

    # Route 2: 1x Top-6 World Championships 2025 AND 1x Top-6 World Cup 2025/2026
    - description: "Top-6 WM 2025 + Top-6 WC 2025/26"
      priority: 1
      conditions: 

      - description: "Top-6 WM 2025"
        competition: ["IBSF World Championships"]
        date: ["2025-03-06", "2025-03-16"]
        performance: [1, 6]
        count_at_least: 1

      - description: "Top-6 WC 2025/26"
        competition: ["IBSF World Cup"]
        date: ["2025-11-01", "2026-01-18"]
        performance: [1, 6]
        count_at_least: 1

    # Route 3: 1x Top-6 EM 2025 AND 1x Top-6 World Cup 2025/2026
    - description: "Top-6 EM 2025 + Top-6 WC 2025/26"
      priority: 1
      conditions: 

      - description: "Top-6 EM 2025"
        competition: ["IBSF European Championships"]
        date:  ["2025-02-03", "2025-02-09"]
        performance: [1, 6]
        count_at_least: 1

      - description: "Top-6 WC 2025/26"
        competition: ["IBSF World Cup"]
        date: ["2025-11-01", "2026-01-18"]
        performance: [1, 6]
        count_at_least: 1

    # Route 4: 2x Top-12 World Cup 2025/2026
    - description: "2x Top-12 WC 2025/26"
      priority: 2
      conditions: 

      - description: "Top-12 WC 2025/26"
        competition: ["IBSF World Cup"]
        date: ["2025-11-01", "2026-01-18"]
        performance: [1, 12]
        count_at_least: 2
        
    # Route 5: 2x Top-14 World Cup 2025/2026 AND Age <= 27
    - description: "2x Top-14 WC 2025/26 + control manually(Age <= 27)"
      priority: 2
      conditions: 

      - description: "Top-14 WC 2025/26"
        competition: ["IBSF World Cup"]
        date: ["2025-11-01", "2026-01-18"]
        performance: [1, 14]
        count_at_least: 2

#      - description: "Age <= 27"
#        age: [1, 27] # check with column date of birth (DoB column) in the results file
