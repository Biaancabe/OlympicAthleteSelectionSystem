Description: "Cross Country Skiing Qualification Rules for Olympic Games 2026"
created at: 2025-12-16
updated at: 2025-12-16
version: "1.0"

# No Class filter at first, because U23 results are included in one of the criterias.
# Question for developper: Where to put the class filter in that file? Every route? Every condition?
# Only one condition has a different class (Route 2 condition 1)
# U23 competiton is specified in the competiton name.Therefore, I don't think a class filter is needed. But no class filter at the beginning to keep the U23 results in.
# Need a discipline filter: only singles disciplines are considered. Teams are formed with athletes that qualified for singles competitons. Duscuss if manually or automatic verification.

rule_tree:
  description: "Qualification Criteria for Cross Country Skiing at Olympic Games 2026"
  sport: "Cross-Country Skiing"

  # main criterias for group 1 athletes
  criteria:
      # Route 1: 1x Top-3 World Championships 2025 AND 1x Top-30 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r1"
      description: "Top-3 WM 2025 + Top-30 WC 2025/26"
      priority: 1
      conditions:
        - condition_id: "cross_country_skiing_r1_c1"
          description: "Top-3 WM 2025"
          competition: ["FIS Nordic World Ski Championships"]
          date: ["2025-02-26", "2025-03-09"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 3
          count_at_least: 1
        - condition_id: "cross_country_skiing_r1_c2"
          description: "Top-30 WC 2025/26"
          competition: ["FIS Cross-Country World Cup"]
          date: ["2025-08-01", "2026-01-21"]
          performance:
            metric: rank
            operator: between
            min: 1
            max: 30
          count_at_least: 1

    # Route 2: 1x Top-3 U23 World Championships 2025 AND 1x Top-25 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r2"
      description: "Top-3 U23 WM 2025 + Top-25 WC 2025/26"
      priority: 1
      conditions:
      - condition_id: "cross_country_skiing_r2_c1"
        description: "Top-3 U23 WM 2025"
        competition: ["FIS Nordic U23 World Ski Championships"]
        date: ["2025-02-26", "2025-03-09"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 3
        count_at_least: 1
      - condition_id: "cross_country_skiing_r2_c2"
        description: "Top-25 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 25
        count_at_least: 1

    # Route 3: 1x Top-3 World Cup 2024/2025 AND 1x Top-25 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r3"
      description: "Top-3 WC 2024/25 + Top-25 WC 2025/26"
      priority: 1
      conditions:
      - condition_id: "cross_country_skiing_r3_c1"
        description: "Top-3 WC 2024/25"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2024-11-29", "2025-07-31"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 3
        count_at_least: 1
      - condition_id: "cross_country_skiing_r3_c2"
        description: "Top-25 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 25
        count_at_least: 1
    # Route 4: 1x Top-15 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r4"
      description: "Top-15 WC 2025/26"
      priority: 1
      conditions:
      - condition_id: "cross_country_skiing_r4_c1"
        description: "Top-15 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 15
        count_at_least: 1

    # Route 5: 2x Top-25 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r5"
      description: "2x Top-25 WC 2025/26"
      priority: 1
      conditions:
      - condition_id: "cross_country_skiing_r5_c1"
        description: "Top-25 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 25
        count_at_least: 2

    # Route 6: 1x Top-3 Continetal Cup 2025/2026 AND 1x Top-25 World Cup 2025/2026
    - criterion_id: "cross_country_skiing_r6"
      description: "Top-3 CC 2025/26 + Top-25 WC 2025/26"
      priority: 1
      conditions:
      - condition_id: "cross_country_skiing_r6_c1"
        description: "Top-3 CC 2025/26"
        competition: ["FIS Cross-Country Continental Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 3
        count_at_least: 1
      - condition_id: "cross_country_skiing_r6_c2"
        description: "Top-25 WC 2025/26"
        competition: ["FIS Cross-Country World Cup"]
        date: ["2025-08-01", "2026-01-21"]
        performance:
          metric: rank
          operator: between
          min: 1
          max: 25
        count_at_least: 1